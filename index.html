<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>WCA Records & Sum of Ranks</title>\n    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 20px; }\n        #record-form { margin-bottom: 20px; }\n        canvas { width: 100%; height: 400px; }\n    </style>\n</head>\n<body>\n    <h1>WCA Records & Sum of Ranks Platform</h1>\n    <form id="record-form">\n        <label for="name">Name:</label>\n        <input type="text" id="name" required>\n        <label for="event">Event:</label>\n        <input type="text" id="event" required>\n        <label for="time">Time (in seconds):</label>\n        <input type="number" id="time" required>\n        <button type="submit">Add Record</button>\n    </form>\n    <canvas id="recordChart"></canvas>\n    <script>\n        const ctx = document.getElementById('recordChart').getContext('2d');\n        let records = [];\n        let chart = new Chart(ctx, {\n            type: 'line',\n            data: {\n                labels: [],\n                datasets: [{ label: 'Record Times', data: [], borderColor: 'rgba(75, 192, 192, 1)', borderWidth: 1, fill: false }]\n            },\n            options: { scales: { y: { beginAtZero: true } } }\n        });\n        document.getElementById('record-form').addEventListener('submit', function(event) {\n            event.preventDefault();\n            const name = document.getElementById('name').value;\n            const eventType = document.getElementById('event').value;\n            const time = parseFloat(document.getElementById('time').value);\n            records.push({ name, event: eventType, time });\n            updateChart();\n            this.reset();\n        });\n        function updateChart() {\n            const labels = records.map(record => `${record.name} (${record.event})`);\n            const data = records.map(record => record.time);\n            chart.data.labels = labels;\n            chart.data.datasets[0].data = data;\n            chart.update();\n        }\n    </script>\n</body>\n</html>
